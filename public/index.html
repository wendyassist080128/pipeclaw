<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PipeClaw - Pipeline Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f23;
            color: #fff;
            min-height: 100vh;
        }

        /* Login Screen */
        #login-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #1a1a3e 0%, #0f0f23 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-box {
            background: #1e1e3f;
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .login-box h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .login-box .logo {
            font-size: 48px;
            text-align: center;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #a0a0c0;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #0f0f23;
            color: #fff;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #6c5ce7;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6c5ce7 0%, #a855f7 100%);
            color: white;
            width: 100%;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.4);
        }
        .error {
            color: #ff6b6b;
            margin-top: 15px;
            text-align: center;
        }

        /* Dashboard */
        #dashboard {
            display: none;
        }
        .header {
            background: #1e1e3f;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .header h1 {
            font-size: 24px;
        }
        .header .status {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #0f0f23;
            border-radius: 20px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff6b6b;
        }
        .status-dot.active {
            background: #00d084;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Canvas */
        .canvas-container {
            padding: 30px;
            height: calc(100vh - 80px);
            overflow: hidden;
        }
        #canvas {
            width: 100%;
            height: 100%;
            background: #0f0f23;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }
        .canvas-node {
            position: absolute;
            background: #1e1e3f;
            border: 2px solid #6c5ce7;
            border-radius: 12px;
            padding: 20px;
            min-width: 150px;
            cursor: move;
            user-select: none;
        }
        .canvas-node .node-label {
            font-weight: 600;
            margin-bottom: 5px;
        }
        .canvas-node .node-type {
            font-size: 12px;
            color: #a0a0c0;
        }
        .canvas-node .node-handle {
            width: 12px;
            height: 12px;
            background: #6c5ce7;
            border-radius: 50%;
            position: absolute;
        }
        .canvas-node .node-handle.input {
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
        }
        .canvas-node .node-handle.output {
            left: -6px;
            top: 50%;
            transform: translateY(-50%);
        }
        .canvas-edge {
            position: absolute;
            height: 3px;
            background: #6c5ce7;
            transform-origin: 0 50%;
        }

        /* Deploy Button */
        .deploy-btn {
            background: linear-gradient(135deg, #00d084 0%, #00a86b 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .deploy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 208, 132, 0.4);
        }
        .deploy-btn.undeploy {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
        }

        /* Floating Chat Widget */
        #chat-widget {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }
        #chat-widget.visible {
            display: block;
        }
        .chat-toggle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c5ce7 0%, #a855f7 100%);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.4);
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .chat-window {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 360px;
            height: 500px;
            background: #1e1e3f;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-window.open {
            display: flex;
        }
        .chat-header {
            background: linear-gradient(135deg, #6c5ce7 0%, #a855f7 100%);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .chat-header h3 {
            flex: 1;
        }
        .chat-header .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        .message.user {
            flex-direction: row-reverse;
        }
        .message .bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            background: #0f0f23;
        }
        .message.user .bubble {
            background: #6c5ce7;
        }
        .chat-input {
            padding: 20px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #333;
            border-radius: 24px;
            background: #0f0f23;
            color: #fff;
            font-size: 14px;
        }
        .chat-input input:focus {
            outline: none;
            border-color: #6c5ce7;
        }
        .chat-input button {
            padding: 12px 20px;
            border: none;
            border-radius: 24px;
            background: #6c5ce7;
            color: white;
            cursor: pointer;
        }

        /* Password Change Modal */
        #password-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #1e1e3f;
            padding: 40px;
            border-radius: 16px;
            width: 400px;
        }
        .modal-content h2 {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-box">
            <div class="logo">🌊</div>
            <h1>PipeClaw</h1>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="admin" value="admin">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <button class="btn btn-primary" onclick="login()">Login</button>
            <div class="error" id="login-error"></div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">
        <div class="header">
            <h1>🌊 PipeClaw Dashboard</h1>
            <div class="status">
                <div class="status-indicator">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">Not Deployed</span>
                </div>
                <button class="deploy-btn" id="deploy-btn" onclick="toggleDeploy()">
                    🚀 Deploy
                </button>
            </div>
        </div>

        <div class="canvas-container">
            <div id="canvas">
                <!-- Nodes will be rendered here -->
            </div>
        </div>
    </div>

    <!-- Password Change Modal -->
    <div id="password-modal">
        <div class="modal-content">
            <h2>🔐 Change Your Password</h2>
            <p style="color: #a0a0c0; margin-bottom: 20px;">For security, please set a new password.</p>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="new-password" placeholder="Enter new password">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Confirm new password">
            </div>
            <button class="btn btn-primary" onclick="changePassword()">Update Password</button>
            <div class="error" id="password-error"></div>
        </div>
    </div>

    <!-- Chat Widget -->
    <div id="chat-widget">
        <div class="chat-window" id="chat-window">
            <div class="chat-header">
                <div class="avatar">🤖</div>
                <h3>Wendy Amira</h3>
                <button class="close-btn" onclick="toggleChat()">×</button>
            </div>
            <div class="chat-messages" id="chat-messages">
                <!-- Messages will appear here -->
            </div>
            <div class="chat-input">
                <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="handleChatEnter(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
        <button class="chat-toggle" onclick="toggleChat()">💬</button>
    </div>

    <script>
        let ws = null;
        let isDeployed = false;

        // Login
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (data.password_change_required) {
                    document.getElementById('password-modal').style.display = 'flex';
                } else if (data.success) {
                    showDashboard();
                } else {
                    document.getElementById('login-error').textContent = data.error || 'Login failed';
                }
            } catch (err) {
                document.getElementById('login-error').textContent = 'Connection failed';
            }
        }

        // Change Password
        async function changePassword() {
            const newPassword = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (newPassword !== confirm) {
                document.getElementById('password-error').textContent = 'Passwords do not match';
                return;
            }

            try {
                const res = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_password: newPassword, confirm })
                });

                const data = await res.json();
                if (data.success) {
                    document.getElementById('password-modal').style.display = 'none';
                    showDashboard();
                } else {
                    document.getElementById('password-error').textContent = data.error;
                }
            } catch (err) {
                document.getElementById('password-error').textContent = 'Failed to update password';
            }
        }

        // Show Dashboard
        function showDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadPipeline();
        }

        // Load Pipeline
        async function loadPipeline() {
            const res = await fetch('/api/pipeline');
            const pipeline = await res.json();
            renderCanvas(pipeline);
        }

        // Render Canvas
        function renderCanvas(pipeline) {
            const canvas = document.getElementById('canvas');
            canvas.innerHTML = '';

            // Render nodes
            pipeline.nodes.forEach(node => {
                const el = document.createElement('div');
                el.className = 'canvas-node';
                el.style.left = node.x + 'px';
                el.style.top = node.y + 'px';
                el.innerHTML = `
                    <div class="node-label">${node.label}</div>
                    <div class="node-type">${node.type}</div>
                    <div class="node-handle input"></div>
                    <div class="node-handle output"></div>
                `;
                canvas.appendChild(el);
            });

            // Render edges
            pipeline.edges.forEach(edge => {
                const fromNode = pipeline.nodes.find(n => n.id === edge.from);
                const toNode = pipeline.nodes.find(n => n.id === edge.to);
                if (fromNode && toNode) {
                    const edgeEl = document.createElement('div');
                    edgeEl.className = 'canvas-edge';
                    const startX = fromNode.x + 150;
                    const startY = fromNode.y + 40;
                    const endX = toNode.x;
                    const endY = toNode.y + 40;
                    const length = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
                    const angle = Math.atan2(endY - startY, endX - startX) * 180 / Math.PI;
                    edgeEl.style.width = length + 'px';
                    edgeEl.style.left = startX + 'px';
                    edgeEl.style.top = startY + 'px';
                    edgeEl.style.transform = `rotate(${angle}deg)`;
                    canvas.appendChild(edgeEl);
                }
            });
        }

        // Deploy
        async function toggleDeploy() {
            const btn = document.getElementById('deploy-btn');
            const endpoint = isDeployed ? '/api/pipeline/undeploy' : '/api/pipeline/deploy';

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pipeline_id: 'main' })
                });

                const data = await res.json();
                if (data.success) {
                    isDeployed = !isDeployed;
                    updateDeployStatus();
                }
            } catch (err) {
                console.error('Deploy failed:', err);
            }
        }

        function updateDeployStatus() {
            const btn = document.getElementById('deploy-btn');
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');

            if (isDeployed) {
                btn.textContent = '⬛ Undeploy';
                btn.classList.add('undeploy');
                dot.classList.add('active');
                text.textContent = 'Deployed';
                document.getElementById('chat-widget').classList.add('visible');
                
                // Send welcome message
                setTimeout(() => {
                    addMessage('🤖 Wake up my friend!', false);
                }, 500);
            } else {
                btn.textContent = '🚀 Deploy';
                btn.classList.remove('undeploy');
                dot.classList.remove('active');
                text.textContent = 'Not Deployed';
                document.getElementById('chat-widget').classList.remove('visible');
            }
        }

        // Chat
        function toggleChat() {
            document.getElementById('chat-window').classList.toggle('open');
        }

        function handleChatEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, true);
            input.value = '';

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'message', content: message }));
            }
        }

        function addMessage(text, isUser) {
            const container = document.getElementById('chat-messages');
            const msg = document.createElement('div');
            msg.className = 'message' + (isUser ? ' user' : '');
            msg.innerHTML = `<div class="bubble">${text}</div>`;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        // WebSocket connection
        function connectWS() {
            ws = new WebSocket(`ws://${window.location.host}/ws/chat`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'response') {
                    addMessage(data.message, false);
                }
            };
        }

        // Initialize
        window.addEventListener('load', () => {
            // Check auth status
            fetch('/api/auth-status')
                .then(res => res.json())
                .then(data => {
                    if (!data.password_change_required) {
                        // Already authenticated, show dashboard
                        showDashboard();
                    }
                })
                .catch(() => {});

            // Connect WebSocket
            connectWS();
        });
    </script>
</body>
</html>
